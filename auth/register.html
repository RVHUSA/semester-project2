<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="This is Vintage Vaults register page" />
    <title>Vintage Vault | Register</title>

    <!-- Google Fonts - Source: https://fonts.google.com/specimen/Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../styles/css/styles.css" />
  </head>

  <body>
    <main class="container-fluid d-flex align-items-center min-vh-100 px-3">
      <div class="auth-form bg-white p-4 p-md-5 shadow rounded-3">
        <a href="/index.html">
          <img
            src="/assets/images/vv-logo-white.png"
            alt="Vintage Vault logo"
            class="auth-logo mb-4"
          />
        </a>
        <h2 class="register-text">
          Register to add your own listings and bid on others
        </h2>
        <form id="register-form">
          <input
            type="text"
            id="username"
            class="form-control mb-3"
            placeholder="Username"
            required
          />
          <input
            type="email"
            id="email"
            class="form-control mb-3"
            placeholder="E-mail (@stud.noroff.no required)"
            required
          />
          <input
            type="password"
            id="password"
            class="form-control mb-3"
            minlength="8"
            placeholder="Password"
            required
          />
          <button type="submit" class="btn-regular w-100">Register</button>
        </form>
        <p
          id="register-error"
          class="error-message text-danger text-center mt-3"
        ></p>
        <p class="auth-color text-center mt-3">
          Do you already have an account? <a href="login.html">Login here.</a>
        </p>
      </div>
    </main>

    <div id="spinner" class="spinner-overlay hidden">
      <div class="spinner"></div>
    </div>
    <script type="module" src="register.js"></script>
  </body>
</html>
